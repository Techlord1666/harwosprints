<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | Harwosprints.ng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: { extend: { colors: { brandOrange: "#ea580c", brandBlack: "#000000" } } },
      }
    </script>
</head>
<body class="bg-white font-body">

<header class="fixed top-0 w-full z-50 px-6 py-6 flex justify-between items-center">
    <div class="flex items-center gap-2">
        <div class="w-10 h-10 rounded-full border-2 border-brandOrange overflow-hidden p-0.5"><img src="harwosprints.ng-logo.jpg" class="w-full h-full object-contain rounded-full"></div>
        <div class="text-xl font-black text-brandOrange uppercase font-headline">Harwosprints</div>
    </div>
</header>

<main class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-md w-full bg-white p-8 border-4 border-brandBlack rounded-[2rem] shadow-2xl">
        <div class="mb-8">
            <h1 class="text-3xl font-black uppercase tracking-tight">Welcome <span class="text-brandOrange">Back.</span></h1>
            <p class="text-slate-500 font-medium">Log in to manage your orders.</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <input id="email" type="email" required class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-brandOrange" placeholder="Email">
            <input id="password" type="password" required class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-brandOrange" placeholder="Password">
            <button type="submit" class="w-full bg-brandBlack text-white font-black py-4 rounded-2xl shadow-xl hover:bg-brandOrange transition-all uppercase tracking-widest">Sign In</button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm">New here? <a href="signup.html" class="text-brandOrange font-black">Create Account</a></p>
        </div>
    </div>
</main>

<script>
    const supabaseUrl = 'https://eicmwdhsxzondsxepegu.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpY213ZGhzeHpvbmRzeGVwZWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDQ3NDksImV4cCI6MjA5MDUyMDc0OX0.ACleGiVT5vLfnI7sgmgHkuzVavKSFMCjthAVCXecoeY';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert(error.message);
        } else {
            window.location.href = "dashboard.html";
        }
    });
</script>
</body>
</html>
