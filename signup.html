<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign Up | Harwosprints.ng</title>
    
    <!-- Supabase SDK & Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: { brandOrange: "#ea580c", brandBlack: "#000000" },
              fontFamily: { headline: ["Space Grotesk"], body: ["Plus Jakarta Sans"] },
            },
          },
        }
    </script>
    <style>
        input { transition: all 0.3s ease; border: 2px solid #f1f5f9 !important; }
        input:focus { transform: translateX(8px); border-color: #ea580c !important; outline: none; background: white !important; }
        #loadingOverlay { display: none; }
        .signature-gradient { background: linear-gradient(135deg, #ea580c 0%, #000000 100%); }
    </style>
</head>
<body class="bg-white font-body text-slate-900 antialiased overflow-x-hidden">

<!-- LOADING SPINNER -->
<div id="loadingOverlay" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center backdrop-blur-sm">
    <div class="w-12 h-12 border-4 border-brandOrange border-t-transparent rounded-full animate-spin"></div>
</div>

<main class="min-h-screen flex flex-col md:row overflow-hidden">
    
    <!-- RIGHT SIDEBAR (Desktop) -->
    <section class="relative w-full md:w-5/12 lg:w-1/2 flex items-center justify-center p-8 md:p-12 overflow-hidden bg-black">
        <div class="absolute inset-0 z-0">
            <img class="w-full h-full object-cover opacity-40 scale-110" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMzC5agupTdzg7L5BzdGVAXKYWQIjEi-kwFGY8YWhvp1VrQgUAS2nIf-j1WNZA2spNE6kQjUqjgW0YUPLOzGagdDQ-LA31H6lERLrqM3FqXEDYusQuVLA74MaCUMyFzZei9sntD7uUakTG14VB7VE9cJgvdZjQ9CG8zZActbb8zjtrRT__DutuaVBT0OgApbe88sn9aV3Tp80MgMFPxd9IS9s0V2rNEc5jkF_Z7ZAn6zTG8PVz6fuTbfpD83fv5CSQuzN-Eo7exOY"/>
        </div>
        <div class="relative z-10 w-full max-w-lg text-white" data-aos="fade-up">
            <span class="text-brandOrange font-headline font-bold tracking-widest text-sm uppercase">Harwosprints Premium</span>
            <h1 class="font-headline font-extrabold text-4xl md:text-6xl mt-4 leading-tight">Elevate Your <br/>Brand's Dimension.</h1>
            <div class="mt-8 p-6 bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10">
                <p class="font-bold text-lg">Trusted by Nigeria's leading creatives</p>
                <p class="text-slate-400 text-sm mt-1">Join the community of 5,000+ top-tier brands.</p>
            </div>
        </div>
    </section>

    <!-- LEFT SIDEBAR (Form) -->
    <section class="flex-1 flex flex-col justify-center p-8 md:p-12 lg:p-24 bg-white">
        <div class="w-full max-w-md mx-auto">
            <!-- Brand Logo in Circle -->
            <div class="mb-10 flex items-center gap-4" data-aos="fade-right">
                <div class="w-12 h-12 rounded-full border-2 border-brandOrange p-0.5 overflow-hidden shadow-md">
                    <img src="harwosprints.ng-logo.jpg" class="w-full h-full object-contain rounded-full">
                </div>
                <h2 class="text-2xl font-black text-brandOrange uppercase tracking-tighter">Harwosprints.ng</h2>
            </div>

            <div class="mb-8" data-aos="fade-up">
                <h3 class="text-3xl font-black text-brandBlack uppercase">Create Account.</h3>
                <p class="text-slate-500 font-medium">Start your professional printing journey.</p>
            </div>

            <form id="signupForm" class="space-y-5" data-aos="fade-up" data-aos-delay="100">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Full Name</label>
                    <input id="full_name" type="text" required class="w-full px-5 py-4 bg-slate-50 rounded-xl focus:ring-0 font-bold" placeholder="e.g. Adewale Jackson">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
                    <input id="email" type="email" required class="w-full px-5 py-4 bg-slate-50 rounded-xl focus:ring-0 font-bold" placeholder="name@company.com">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Password</label>
                    <input id="password" type="password" required class="w-full px-5 py-4 bg-slate-50 rounded-xl focus:ring-0 font-bold" placeholder="••••••••">
                    <p class="text-[9px] text-slate-400 mt-2 uppercase font-bold tracking-tighter">Min. 8 characters with 1 uppercase & 1 number.</p>
                </div>

                <button type="submit" class="w-full signature-gradient text-white font-black py-5 rounded-2xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3 group">
                    <span class="uppercase tracking-widest">Create Account</span>
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                </button>
            </form>

            <p class="mt-8 text-center text-sm font-bold uppercase tracking-tight">
                Already have an account? 
                <a href="login.html" class="text-brandOrange underline hover:text-brandBlack ml-1">Sign In</a>
            </p>
        </div>
    </section>
</main>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 1000, once: true });

    // Supabase Configuration
    const supabaseUrl = 'https://eicmwdhsxzondsxepegu.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpY213ZGhzeHpvbmRzeGVwZWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDQ3NDksImV4cCI6MjA5MDUyMDc0OX0.ACleGiVT5vLfnI7sgmgHkuzVavKSFMCjthAVCXecoeY';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById('signupForm');
    const loader = document.getElementById('loadingOverlay');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        loader.style.display = 'flex';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('full_name').value;

        // Sign up with Supabase
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: {
                    full_name: fullName,
                }
            }
        });

        loader.style.display = 'none';

        if (error) {
            alert("Registration Failed: " + error.message);
        } else {
            alert("Success! Account created for " + fullName);
            window.location.href = "login.html"; // Redirect to login
        }
    });
</script>
</body>
</html>
